<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            -webkit-font-smoothing: none;
            /* outline: 2px solid black; */
        }
    </style>
</head>
<body>
    <script>
        const WIDTH = 370
        const HEIGHT = 677
        const RATIO = Math.ceil(window.devicePixelRatio) * 2

        const profile = {
            server: 'America',
            nickname: 'N0Skill',
            uid: 823_126_898,
            team: [
                { imageUrl: './calcharo.png', level: 45, constellation: 3, accentColor: 'rgb(194, 100, 76)' },
                { imageUrl: './calcharo.png', level: 88, constellation: 0, accentColor: 'rgb(194, 100, 76)' },
                { imageUrl: './calcharo.png', level: 37, constellation: 2, accentColor: 'rgb(194, 100, 76)' },
            ]
        }

        const loadImage = (src) => {
            return new Promise((res, rej) => {
                const image = new Image()
                image.crossOrigin = 'anonymous'
                image.onload = () => {
                    res(image)
                }
                image.onerror = () => {
                    rej()
                }
                image.src = src
            })
        }

        const createCanvas = (width, height, setTransform = true) => {
            const canvas = document.createElement('canvas')
            const ctx = canvas?.getContext('2d', { willReadFrequently: true })
            if (!ctx) throw new Error('No ctx')

            if (width !== undefined) {
                canvas.width = width * RATIO
                canvas.style.width = `${width}px`
            }
            if (height !== undefined) {
                canvas.height = height * RATIO
                canvas.style.height = `${height}px`
            }

            if (setTransform) {
                ctx.setTransform(RATIO, 0, 0, RATIO, 0, 0)
            }
            ctx.imageSmoothingEnabled = false

            return { canvas, ctx }
        }

        const { canvas, ctx } = createCanvas(WIDTH, HEIGHT)
        document.body.appendChild(canvas)

        const drawing = {
            mask: (mask, ...shapes) => {
                const { canvas: maskBuffer, ctx: maskBufferCtx } = createCanvas(WIDTH, HEIGHT)
                const { canvas: shapeBuffer, ctx: shapeBufferCtx } = createCanvas(WIDTH, HEIGHT)

                mask(maskBufferCtx)
                shapes.forEach(shape => shape(shapeBufferCtx))
                maskBufferCtx.globalCompositeOperation = 'source-in';
                drawing.drawImage(maskBufferCtx, false, shapeBuffer, 0, 0)

                return maskBuffer
            },
            linearGradient: (ctx, x, y, w, h, ...colors) => {
                const gradient = ctx.createLinearGradient(0, 0, w, h)
                colors.forEach((c, idx) => gradient.addColorStop(idx, c))

                const fillStyle = ctx.fillStyle
                ctx.fillStyle = gradient
                ctx.fillRect(x, y, w, h)
                ctx.fillStyle = fillStyle
            },
            roundedRect: (ctx, x, y, w, h, radii, color) => {
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, radii);
                const fillStyle = ctx.fillStyle
                ctx.fillStyle = color
                ctx.fill()
                ctx.fillStyle = fillStyle
            },
            text: (ctx, text, x, y, font, fontSize, color, textBaseline) => {
                const prevFont = ctx.font
                const prevTextBaseline = ctx.font
                const fillStyle = ctx.fillStyle
                ctx.fillStyle = color ?? 'black'
                ctx.font = `${fontSize ?? 16}px '${font ?? 'Arial'}'`
                ctx.textBaseline = textBaseline
                ctx.fillText(text, x, y)
                ctx.font = prevFont
                ctx.textBaseline = prevTextBaseline
                ctx.fillStyle = fillStyle
            },
            drawImage: (ctx, scale = false, ...args) => {
                if (scale) {
                    ctx.drawImage(...args)
                } else {
                    ctx.save()
                    ctx.setTransform(1, 0, 0, 1, 0, 0)
                    ctx.drawImage(...args)
                    ctx.restore()
                }
            },
            fillRect: (ctx, color, ...args) => {
                const fillStyle = ctx.fillStyle
                ctx.fillStyle = color
                ctx.fillRect(...args)
                ctx.fillStyle = fillStyle
            }
        };

        (async () => {
            const image = await loadImage('./profile-card-bg.webp')
            const teamImages = await Promise.all(profile.team.map(t => loadImage(t.imageUrl)))

            const root = drawing.mask(
                (ctx) => {
                    drawing.roundedRect(ctx, 0, 0, WIDTH, HEIGHT, [0.75 * 16], 'black')
                },
                (ctx) => {
                    drawing.drawImage(ctx, true, image, 0, 0, image.width, image.height, 0, 0, WIDTH, HEIGHT)

                    // header
                    drawing.linearGradient(ctx, 0, 0, WIDTH, 44, '#ffc96040', '#5d3d0cbf')

                    drawing.text(ctx, 'Wuthering Waves ⟡ Покои Чанли', 0 + 8, (44 - 20), 'Arial', 14, '#FFFFFF', 'middle')

                    drawing.roundedRect(ctx, WIDTH - 66, (44 - 20) / 2, 84, 20, [0.75 * 16, 0, 0, 0.75 * 16], '#EDDAB8')
                    drawing.text(ctx, profile.server, WIDTH - 66 + 8, (44 - 20), 'Arial', 14, '#776868', 'middle')

                    // nickname & uid
                    let offsetTop = 44 + 0.25 * 16 + 16
                    drawing.text(ctx, profile.nickname, 0.5 * 16, offsetTop, 'Arial', 16, '#FFFFFF', 'middle')
                    offsetTop += 24
                    drawing.text(ctx, `UID: ${profile.uid}`, 0.5 * 16, offsetTop, 'Arial', 14, '#FFFFFF', 'middle')
                    offsetTop += 14 + 0.5 * 16

                    // characters
                    for (let i = 0; i < profile.team.length; ++i) {
                        const character = profile.team[i]

                        const gap = 0.25 * 16
                        const width = (WIDTH - gap * (profile.team.length + 1)) / 3

                        const buffer = drawing.mask(
                            (ctx) => drawing.roundedRect(ctx, 0, 0, width, 240, [0.75 * 16]),
                            (ctx) => {
                                // bg
                                drawing.fillRect(ctx, character.accentColor, 0, 0, width, 240)

                                // avatar
                                const image = teamImages[i]
                                drawing.drawImage(ctx, true, image, 0, 0, image.width, image.height, 0, 0, width, 240)

                                // level
                                drawing.roundedRect(ctx, 0, 0.75 * 16, 30, 28, [0, 0.75 * 16, 0.75 * 16, 0], '#EBC920')
                                drawing.text(ctx, character.level, 4, 0.75 * 16 + 14 + (28 - 18) / 2, 'Arial', 14, '#FFFFFF')
                            }
                        )
                        drawing.drawImage(ctx, false, buffer, i * width * RATIO + (i+1) * gap * RATIO, offsetTop * RATIO)
                    }
                    offsetTop += 240 + 16

                    // about
                    drawing.roundedRect(ctx, 0.25 * 16, offsetTop, WIDTH - 2 * 0.25 * 16, 6 * 16 + 1.5 * 16 + 0.5 * 16, [0.75 * 16], '#FFFAE7')
                    

                    // constellation (z-index)
                    for (let i = 0; i < profile.team.length; ++i) {
                        const character = profile.team[i]

                        const gap = 0.25 * 16
                        const width = (WIDTH - gap * (profile.team.length + 1)) / 3
                        
                        drawing.roundedRect(ctx, (i+1) * gap + (i+1) * width - width / 2 - 44 / 2, offsetTop - 16 - 44 / 2, 44, 44, [44], '#A17DA8')
                        drawing.roundedRect(ctx, (i+1) * gap + (i+1) * width - width / 2 - 40 / 2, offsetTop - 16 - 40 / 2, 40, 40, [40], '#EBC920')
                        drawing.text(ctx, character.level, (i+1) * gap + (i+1) * width - width / 2 - 40 / 2 + 11, offsetTop - 16 - 40 / 2 + 14 + 8, 'Arial', 16, '#FFFFFF')
                    }
                },
            )

            drawing.drawImage(ctx, false, root, 0, 0)
        })();
    </script>
</body>
</html>
