<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            -webkit-font-smoothing: none;
            /* outline: 2px solid black; */
        }
    </style>
</head>
<body>
    <script src="engine.js"></script>
    <script>
        // const WIDTH = 370
        // const HEIGHT = 677
        const WIDTH = 400
        const HEIGHT = Math.floor(WIDTH * 16 / 9)
        const RATIO = Math.ceil(window.devicePixelRatio) * 3

        const profile = {
            server: 'America',
            nickname: 'N0Skill',
            about: 'Sed ornare condimentum porttitor. Aliquam fringilla elit nibh, sed laoreet eros laoreet in. Sed rutrum purus arcu, tincidunt sodales risus efficitur sit amet. Aliquam sollicitudin interdum sodales.'.repeat(3),
            uid: 823_126_898,
            team: [
                { imageUrl: './calcharo.png', level: 45, constellation: 3, accentColor: 'rgb(194, 100, 76)' },
                { imageUrl: './calcharo.png', level: 5, constellation: 0, accentColor: 'rgb(194, 100, 76)' },
                { imageUrl: './calcharo.png', level: 37, constellation: 2, accentColor: 'rgb(194, 100, 76)' },
            ]
        }

        const { canvas, ctx, Drawing } = createCanvas(WIDTH, HEIGHT, RATIO)
        document.body.appendChild(canvas);

        const draw = async () => {
            const image = await Loader.loadImage('./profile-card-bg.webp')
            const teamImages = await Promise.all(profile.team.map(t => Loader.loadImage(t.imageUrl)))

            const root = Drawing.mask(
                (ctx, Drawing) => {
                    Drawing.roundedRect(0, 0, WIDTH, HEIGHT, [0.75 * 16], 'black')
                },
                (ctx, Drawing) => {
                    // bg
                    Drawing.drawImage(true, image, 0, 0, image.width, image.height, 0, 0, WIDTH, HEIGHT)

                    // header
                    Drawing.linearGradient(0, 0, WIDTH, 44, '#ffc96040', '#5d3d0cbf')
                    Drawing.textV2('Wuthering Waves ⟡ Покои Чанли', 8, 0, {
                        font: 'Arial',
                        fontSize: 14,
                        lineHeight: '44px',
                        color: '#FFFFFF'
                    })
                    Drawing.roundedRect(WIDTH - 66, (44 - 20) / 2, 84, 20, [0.75 * 16, 0, 0, 0.75 * 16], '#EDDAB8')
                    Drawing.textV2(profile.server, WIDTH - 66, 0, {
                        font: 'Arial',
                        fontSize: 14,
                        lineHeight: '44px',
                        maxWidth: 66,
                        alignText: 'center',
                        color: '#776868'
                    })

                    // nickname & uid
                    let offsetTop = 44 + 0.25 * 16
                    Drawing.textV2(profile.nickname, 0.5 * 16, offsetTop, {
                        font: 'Arial',
                        fontSize: 16,
                        lineHeight: '24px',
                        color: '#FFFFFF'
                    })
                    offsetTop += 24
                    Drawing.textV2(`UID: ${profile.uid}`, 0.5 * 16, offsetTop, {
                        font: 'Arial',
                        fontSize: 14,
                        lineHeight: '16px',
                        color: '#FFFFFF'
                    })
                    offsetTop += 16 + 0.5 * 16

                    // characters
                    for (let i = 0; i < profile.team.length; ++i) {
                        const character = profile.team[i]

                        const gap = 0.25 * 16
                        const width = (WIDTH - gap * (profile.team.length + 1)) / 3

                        const buffer = Drawing.mask(
                            (ctx, Drawing) => Drawing.roundedRect(0, 0, width, 240, [0.75 * 16]),
                            (ctx, Drawing) => {
                                // bg
                                Drawing.fillRect(character.accentColor, 0, 0, width, 240)

                                // avatar
                                const image = teamImages[i]
                                Drawing.drawImage(true, image, 0, 0, image.width, image.height, 0, 0, width, 240)

                                // level
                                Drawing.roundedRect(0, 0.75 * 16, 30, 28, [0, 0.75 * 16, 0.75 * 16, 0], '#EBC920')
                                // Drawing.text(character.level, 4, 0.75 * 16 + 14 + (28 - 18) / 2, 'Arial', 14, '#FFFFFF')
                                Drawing.textV2(character.level.toString(), 0, 0.75 * 16, {
                                    font: 'Arial',
                                    fontSize: 14,
                                    lineHeight: '28px',
                                    color: '#FFFFFF',
                                    alignText: 'center',
                                    maxWidth: 28
                                })
                            }
                        )
                        Drawing.drawImage(false, buffer, i * width * RATIO + (i+1) * gap * RATIO, offsetTop * RATIO)
                    }
                    offsetTop += 240 + 16

                    // about
                    Drawing.roundedRect(0.25 * 16, offsetTop, WIDTH - 2 * 0.25 * 16, 6 * 16 + 1.5 * 16 + 0.5 * 16, [0.75 * 16], '#FFFAE7')
                    Drawing.roundedRect(0.25 * 16, offsetTop, 64, 20, [0.75 * 16, 0, 0.75 * 16, 0], '#7D7881')
                    Drawing.textV2('About', 0.25 * 16, offsetTop, {
                        font: 'Arial',
                        fontSize: 0.75 * 16,
                        lineHeight: '20px',
                        fontWeight: 'thin',
                        maxWidth: 64,
                        alignText: 'center',
                        color: '#FFFAE7',
                    })
                    Drawing.textV2(profile.about, 0.25 * 16 + 0.5 * 16, offsetTop + 1.5 * 16, {
                        font: 'Arial',
                        fontSize: 0.75 * 16,
                        lineHeight: '16px',
                        color: '#7D7881',
                        fontWeight: 'thin',
                        // verticalAlignment: 'middle',
                        maxWidth: WIDTH - 2 * 0.25 * 16 - 2 * 0.5 * 16,
                        maxHeight: 6 * 16
                    })

                    // constellation (z-index)
                    for (let i = 0; i < profile.team.length; ++i) {
                        const character = profile.team[i]

                        const gap = 0.25 * 16
                        const width = (WIDTH - gap * (profile.team.length + 1)) / 3
                        
                        Drawing.roundedRect((i+1) * gap + (i+1) * width - width / 2 - 44 / 2, offsetTop - 16 - 44 / 2, 44, 44, [44], '#A17DA8')
                        Drawing.roundedRect((i+1) * gap + (i+1) * width - width / 2 - 40 / 2, offsetTop - 16 - 40 / 2, 40, 40, [40], '#EBC920')
                        // @todo measure text / center
                        Drawing.textV2(character.level.toString(), (i+1) * gap + (i+1) * width - width / 2 - 40 / 2, offsetTop - 16 - 40 / 2, {
                            font: 'Arial',
                            fontSize: 1.125 * 16,
                            lineHeight: `40px`,
                            color: '#FFFFFF',
                            alignText: 'center',
                            maxWidth: 40
                        })
                    }
                    offsetTop += 6 * 16 + 1.5 * 16 + 0.5 * 16 + 0.5 * 16

                    // info
                    Drawing.roundedRect(0.25 * 16, offsetTop, WIDTH - 2 * 0.25 * 16, 10 * 16 + 1.25 * 16 + 0.5 * 16, [0.75 * 16], '#FFFAE7')
                    Drawing.roundedRect(0.25 * 16, offsetTop, 64, 20, [0.75 * 16, 0, 0.75 * 16, 0], '#7D7881')
                    Drawing.textV2('Info', 0.25 * 16, offsetTop, {
                        font: 'Arial',
                        fontSize: 0.75 * 16,
                        lineHeight: '20px',
                        fontWeight: 'thin',
                        maxWidth: 64,
                        alignText: 'center',
                        color: '#FFFAE7',
                    })
                    offsetTop += 75

                    Drawing.divider(0.25 * 16 + 0.5 * 16, offsetTop, WIDTH - 2 * 0.25 * 16 - 2 * 0.5 * 16, '#D8C9AD')

                },
            )

            Drawing.drawImage(false, root, 0, 0)
        }

        draw()
    </script>
</body>
</html>
